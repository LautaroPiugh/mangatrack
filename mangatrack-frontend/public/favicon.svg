<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Green background with rounded corners -->
  <rect width="200" height="200" rx="48" fill="#22c55e"/>
  
  <!-- White manga symbol -->
  <g fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- Horizontal line top -->
    <line x1="50" y1="70" x2="150" y2="70"/>
    <!-- Vertical line center -->
    <line x1="100" y1="50" x2="100" y2="150"/>
    <!-- Horizontal line bottom -->
    <line x1="50" y1="130" x2="150" y2="130"/>
    <!-- Diagonal lines forming star -->
    <line x1="50" y1="100" x2="100" y2="150"/>
    <line x1="150" y1="100" x2="100" y2="150"/>
  </g>
</svg>